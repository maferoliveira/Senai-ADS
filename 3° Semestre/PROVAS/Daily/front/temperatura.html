<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Temperatura</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
  <h2>Buscar Temperatura</h2>
  <input type="text" id="cidade" class="form-control" placeholder="Digite a cidade">
  <button onclick="buscarTemp()" class="btn btn-primary mt-2">Buscar</button>

  <p id="resultado"></p>
</div>

<script>
async function buscarTemp() {
  let cidade = document.getElementById("cidade").value;

  let apiKey = "SUA_API_KEY"; // OpenWeather
  let url = `https://api.openweathermap.org/data/2.5/weather?q=${cidade}&appid=${apiKey}&units=metric&lang=pt_br`;

  let res = await fetch(url);
  let data = await res.json();

  document.getElementById("resultado").innerText =
    `Temperatura: ${data.main.temp}°C`;
}
</script>

</body>
</html>
