<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Tarefas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
  <h2>Nova Tarefa</h2>

  <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalTarefa">
    Adicionar Tarefa
  </button>
</div>

<!-- Modal -->
<div class="modal fade" id="modalTarefa">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Criar Tarefa</h5>
      </div>

      <div class="modal-body">
        <input class="form-control mb-2" placeholder="Nome">
        <input type="date" class="form-control mb-2">
        <input type="date" class="form-control mb-2">
        <textarea class="form-control" placeholder="Descrição"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary">Salvar</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
