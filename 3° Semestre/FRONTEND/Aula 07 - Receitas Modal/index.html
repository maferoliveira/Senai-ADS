<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas - Dona Maria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Dona Maria</h1>
        <h2>As melhores receitas estão aqui!</h2>
        <button type="button" onclick="abrirModal()">Adicionar nova receita</button>
    </header>
    <main>
        
    </main>
    <div id="modalreceitas" class="modal">
        <form id="formreceitas" class="modal-content">
            <h2>Nova Receita</h2>
            <input type="text" id = "url" name="url" placeholder="Image URL">
            <input type="text" id = "nome" name="nome" placeholder="Nome da receita">
            <input type="text" id = "tipo" name="tipo" placeholder="Tipo">
            <input type="text" id = "ingredientes" name="ingredientes" placeholder="Ingredientes necessários">
            <input type="text" id = "modoFazer" name="modoFazer" placeholder="Como fazer">
            <input type="number" id = "custoAproximado" name="custoAproximado" placeholder="Custo aproximado">
            <div class="modal-buttons">
                <button type="submit">Salvar receita</button>
                <button type="reset" onclick="fecharModal()">Cancelar</button>
            </div>
        </form>
    </div>
    <footer><h2>By ®mafer oliveira</h2></footer>
    <script src="script.js"></script>
</body>
</html>
