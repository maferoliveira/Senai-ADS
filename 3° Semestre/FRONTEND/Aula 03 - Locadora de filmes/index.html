<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarMovies - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Filmregister</h1>
        <button type="button" onclick="openmodal()">+ New Movie</button>
    </header>
    <main>
        <table>
            <thead>
                <tr>
                    <th>Cover</th>
                    <th>Name</th>
                    <th>Gender</th>
                    <th>Year</th>
                    <th>Production Company</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="dados"></tbody>
        </table>
    </main>
    <!-- modal -->
<div id="modalfilm" class="modal">
    <form id="formfilm" class="modal-content">
        <h2>New Movie</h2>
        <input type="text" name="url" placeholder="Image URL">
        <input type="text" name="name" placeholder="Name">
        <input type="text" name="gender" placeholder="Gender">
        <input type="date" name="year" placeholder="Year">
        <input type="text" name="production" placeholder="Production company">
        <div class="modal-buttons">
            <button type="submit">Save</button>
            <button type="reset" onclick="closemodal()">Cancel</button>
        </div>
    </form>
</div>
<script src="script.js"></script>
</body>
</html>
